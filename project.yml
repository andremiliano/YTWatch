name: YTWatch

options:
  bundleIdPrefix: com.andre.ytwatch
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16"
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Secrets.xcconfig
  Release: Config/Secrets.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_STRICT_CONCURRENCY_CHECKING: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
  configs:
    Debug:
      ASSETCATALOG_COMPILER_SKIP_APP_STORE_DEPLOYMENT: YES

targets:

  # ── iOS App ────────────────────────────────────────────────────────────────
  YTWatch:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOS
        excludes: []
      - path: Shared
      - path: iOS/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andre.ytwatch.app
        INFOPLIST_FILE: Config/iOS-Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/iOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: YTWatch Watch App
    entitlements:
      path: Config/iOS.entitlements

  # ── watchOS App ────────────────────────────────────────────────────────────
  YTWatch Watch App:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: watchOS
        excludes: []
      - path: Shared
      - path: watchOS/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andre.ytwatch.app.watchkitapp
        INFOPLIST_FILE: Config/watchOS-Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/watchOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Config/watchOS.entitlements
